# Render Blueprint Specification for Rosh Fine Jewellery
services:
  # React Frontend Static Site
  - type: static
    name: roshjewellery-frontend
    buildCommand: cd client && npm install && npm run build
    publishPath: client/dist
    routes:
      # Rewrites all requests that don't match static files to index.html to allow React Router client-side routing
      - type: rewrite
        source: /*
        destination: /index.html

  # Node.js Express Backend
  - type: web
    name: roshjewellery-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
